version: '3.8'

services:
  temporal:
    image: temporalio/auto-setup:1.30.0
    ports:
      - "7233:7233"
      - "8080:8080"
    environment:
      - TEMPORAL_ADDRESS=localhost:7233
      - TEMPORAL_NAMESPACE=default
    healthcheck:
      test: ["CMD", "temporal", "operator", "namespace", "describe", "default"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10
    ports:
      - "4222:4222"
      - "8222:8222"
    command: "--http_port 8222"
    healthcheck:
      test: ["CMD", "nats-server", "--help"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:
